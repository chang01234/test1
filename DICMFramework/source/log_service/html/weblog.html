<!DOCTYPE html>
<html>
<head>
    <title>DICM Log Console</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: monospace;
            margin: 0;
            padding: 20px;
        }
        #terminal {
            background-color: #000000;
            border: 1px solid #333;
            height: 80vh;
            padding: 10px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .command {
            color: #00ff00;
        }
        .response {
            color: #ffffff;
        }
        .error {
            color: #ff0000;
        }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <button id="button" type="button" onclick="clickHandler()">Save current log to file</button>
    <script>
        const terminal = document.getElementById("terminal");
        let ws = new WebSocket(`ws://${window.location.host}/logconsole`);
        
        async function clickHandler() {
            const d = new Date();
            let filename = d.toDateString() + "-" + d.toTimeString();
            let tt = document.querySelector('#terminal').innerHTML
            let blobdtMIME = new Blob([tt], { type: "text/html" })
            let url = URL.createObjectURL(blobdtMIME)
            let new_element = document.createElement("a")
            new_element.setAttribute("download", filename);
            new_element.href = url;
            new_element.click();
        }
        // Add ANSI color code handling
        function convertAnsiToHtml(text) {
            // Replace ANSI codes with spans
            return text
                .replace(/\033\[0m/g, '</span>')
                .replace(/\033\[0;31m/g, '<span style="color: red">')
                .replace(/\033\[0;32m/g, '<span style="color: green">')
                .replace(/\033\[0;33m/g, '<span style="color: yellow">')
                .replace(/\033\[0;34m/g, '<span style="color: blue">')
                .replace(/\033\[0;35m/g, '<span style="color: magenta">')
                .replace(/\033\[0;36m/g, '<span style="color: cyan">')
                .replace(/\033\[0;37m/g, '<span style="color: white">');
        }

        function appendToTerminal(text, className) {
            const div = document.createElement("div");
            div.className = className;
            div.innerHTML = convertAnsiToHtml(text);
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        ws.onopen = () => {
            appendToTerminal("Connected to DICM Log Console\n\n", "response");
        };

        ws.onclose = () => {
            appendToTerminal("Connection closed\n", "error");
        };

        ws.onmessage = (event) => {
            appendToTerminal(event.data, "response");
        };

    </script>
</body>
</html>
